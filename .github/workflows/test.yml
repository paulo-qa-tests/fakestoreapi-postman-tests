name: Testes API

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Instalar Newman
        run: npm install -g newman
      
      - name: Executar testes
        continue-on-error: true
        run: |
          newman run collections/FakeStoreAPI_Complete_Tests.postman_collection.json \
            -e environments/FakeStoreAPI_Environment.json \
            --reporters cli \
            --bail
      
      - name: Verificar resultado
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Testes passaram!"
          else
            echo "❌ Alguns testes falharam, mas o workflow continua"
          fi